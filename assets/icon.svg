<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f7ef8"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#g1)"/>
  <!-- Scales of justice -->
  <!-- Center pole -->
  <rect x="31" y="14" width="2" height="36" rx="1" fill="white" opacity="0.9"/>
  <!-- Top crossbar -->
  <rect x="18" y="19" width="28" height="2.5" rx="1.25" fill="white" opacity="0.9"/>
  <!-- Left pan chain -->
  <line x1="22" y1="21.5" x2="20" y2="32" stroke="white" stroke-width="1.5" opacity="0.8"/>
  <line x1="22" y1="21.5" x2="24" y2="32" stroke="white" stroke-width="1.5" opacity="0.8"/>
  <!-- Right pan chain -->
  <line x1="42" y1="21.5" x2="40" y2="32" stroke="white" stroke-width="1.5" opacity="0.8"/>
  <line x1="42" y1="21.5" x2="44" y2="32" stroke="white" stroke-width="1.5" opacity="0.8"/>
  <!-- Left pan -->
  <path d="M17 32 Q22 36 27 32" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.9"/>
  <!-- Right pan (slightly lower = heavier) -->
  <path d="M37 34 Q42 38 47 34" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.9"/>
  <!-- Base -->
  <rect x="25" y="50" width="14" height="3" rx="1.5" fill="white" opacity="0.7"/>
  <rect x="22" y="52" width="20" height="2.5" rx="1.25" fill="white" opacity="0.5"/>
</svg>
